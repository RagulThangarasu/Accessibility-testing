<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Accessibility Scanner — WCAG 2.0 AA</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Accessibility Scanner</h1>
      <p>Enter any website URL to scan it against the <strong>WCAG 2.0 AA</strong> standard and generate a downloadable report.</p>
    </header>

    <div class="search-label" aria-hidden="true">Accessibility</div>
    <form id="scan-form" class="scan-box">
      <input
        id="url"
        type="text"
        placeholder="Search"
        aria-label="Website URL to validate"
        autocomplete="off"
        spellcheck="false"
        required
      />
      <button id="scan-btn" type="submit">Validate</button>
    </form>

    <div class="scan-options">
      <label class="opt">
        <input type="checkbox" id="sitemap" />
        Crawl the whole site from its sitemap
      </label>
      <label class="opt" id="limit-wrap" hidden>
        Max pages
        <select id="limit">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </label>
    </div>

    <section id="status" class="status hidden"></section>

    <section id="results" class="results hidden">
      <div class="result-head">
        <div>
          <h2 id="result-title">Results</h2>
          <a id="result-url" class="result-url" href="#" target="_blank" rel="noopener"></a>
        </div>
        <div class="result-actions">
          <a id="download-html" class="btn" target="_blank" rel="noopener">View HTML report</a>
          <a id="download-pdf" class="btn btn-primary" target="_blank" rel="noopener">Download PDF</a>
        </div>
      </div>

      <div class="cards" id="cards"></div>
      <p id="ai-note" class="ai-note hidden"></p>
      <div id="issues" class="issues hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
